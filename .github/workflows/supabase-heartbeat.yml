name: Supabase Heartbeat

on:
  schedule:
    - cron: '0 0 */5 * *'  # Runs every 5 days at midnight UTC
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase Database
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/?apikey=$SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json")

          echo "Response code: $RESPONSE"

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "✅ Heartbeat successful - Supabase project is active."
          else
            echo "❌ Heartbeat failed with HTTP $RESPONSE"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
