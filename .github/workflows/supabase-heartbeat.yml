name: Supabase Heartbeat

on:
  schedule:
    - cron: '0 0 */5 * *'  # Runs every 5 days at midnight UTC
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase Database
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/rpc/ping" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "Response code: $RESPONSE"

          # 200 = success, 404 = function not found but DB is alive, both are fine
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 404 ] || [ "$RESPONSE" -eq 400 ]; then
            echo "✅ Heartbeat successful - Supabase project is active."
          else
            echo "❌ Heartbeat failed with HTTP $RESPONSE"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
